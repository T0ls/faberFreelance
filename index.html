<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Homepage • Fabrizio Arrigo</title>

		<!-- Bootstrap -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
		<!-- Bootstrap Icons -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/hover.css/2.3.1/css/hover.css"/>

		<link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@400;700&display=swap" rel="stylesheet">

		<style>
      @font-face{
        font-family: "Obra Letra";
        src: local("Obra Letra")
             /* , url("/fonts/ObraLetra.woff2") format("woff2"),
                url("/fonts/ObraLetra.woff") format("woff") */;
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      /* Navbar con sfondo pieno per evitare trasparenza */
      .navbar { background-color: #ffffff; }

      /* LOGO */
      .logo-mark{
        display:inline-flex;
        align-items:flex-end;
        gap:.3rem;
        margin-left:25px;
        /* scala globale del logo: aumenta/diminuisci qui */
        --logo-size: 38px;
        font-size: var(--logo-size);
        color:#000;
      }
      .logo-F{
        font-family: "Inria Serif", serif;
        font-weight: 700;
        /* F alta ~ due righe */
        font-size: 2.55em;
        line-height: .84;
        margin-right:.05rem;
      }
      .logo-stack{
        display:flex;
        flex-direction:column;
        line-height:1;
		margin-left: -5px;
      }
      .logo-line{
        font-family: "Inria Serif", serif;
        font-size:1em;
        line-height:1;
        letter-spacing: .005em; /* micro aggiustamento */
      }
	  .nav-link{
		  font-size: 20px;
	  }

	  .page-hero{padding:2rem 0 1rem;}

	  .page-hero{
		min-height: calc(100vh - 72px);
		display:flex;
		position: relative;
	  }

	  /* Ensure hero content (video + texts) fits in first viewport */
	  .page-hero .container{
		display:flex;
		flex-direction:column;
		align-items:center;
		gap: .75rem;
	  }

	  .hero-video{
		display:block;
		width:100%;
		height:auto;
		max-height: 46vh;
		margin-bottom:.5rem;
	  }

	  .hero-center-img{
		max-width: 92%;
		margin-inline: auto;
	  }

		  .landing-images{
			padding-inline: 1rem;
		  }

		  .landing-image-col{
			display:flex;
			justify-content:center;
		  }

		  .landing-img{
			display:block;
			width:100%;
			max-width: 320px;
			height:auto;
		  }

	  @media (min-width: 576px){
		.hero-video{ max-height: 50vh; }
	  }
	  @media (min-width: 768px){
		.hero-video{ max-height: 54vh; }
	  }
	  @media (min-width: 992px){
		.hero-video{ max-height: 56vh; }
		.page-hero{ padding:2.5rem 0 1rem; }
	  }

	  .scroll-cue{
		bottom:1rem;
		display:flex;
		justify-content:center;
	  }

	  .scroll-down-btn{
		background: transparent;
		border: none;
		color: #111;
		padding: .25rem .5rem;
		border-radius: 6px;
		transition: transform 160ms ease, opacity 160ms ease;
		opacity: .85;
	  }

	  .scroll-down-btn:hover{ opacity: 1; transform: translateY(2px); }
	  .scroll-down-btn:active{ transform: translateY(3px); }
	  .scroll-down-btn:focus{ outline: none; }
	  .scroll-down-btn:focus-visible{ box-shadow: 0 0 0 2px rgba(0,0,0,.28); }

	  .scroll-icon{ animation: arrowBounce 1.8s ease-in-out infinite; }

	  @keyframes arrowBounce{
		0%, 100% { transform: translateY(0); }
		50% { transform: translateY(4px); }
	  }

		  @media (max-width: 767.98px){
			.page-hero{
				min-height:auto;
				padding:1.25rem 0 .5rem;
			}

			.page-hero .container{
				gap:.5rem;
			}

			.scroll-cue{
				display:none;
			}

			.landing-images{
				padding-inline: 1.5rem;
			}

			.landing-images .row{
				row-gap: 1rem !important;
			}

			.landing-img{
				width: min(100%, 78vw);
				max-width: 350px;
				aspect-ratio: 1 / 1;
				object-fit: cover;
			}

			.pulse{
				animation: pulse-mobile 1.2s ease-in-out both;
			}

			@keyframes pulse-mobile{
				0% { transform: scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
				50% { transform: scale(1.03); box-shadow: 0 12px 24px rgba(0,0,0,0.14); }
				100% { transform: scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
			}
		  }

			/* Pulse animation for homepage images */
			.pulse-target {
				display: inline-block;
				will-change: transform, box-shadow;
			}

			@keyframes pulse {
				0% { transform: scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
				50% { transform: scale(1.06); box-shadow: 0 18px 36px rgba(0,0,0,0.16); }
				100% { transform: scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
			}

			.pulse {
				animation: pulse 1.2s ease-in-out both;
			}

			/* Page entry fade from bottom */
			body.page-animate {
				opacity: 0;
				transform: translateY(22px);
				transition: none;
			}

			body.page-animate.page-animate--visible {
				animation: fadeInUp 720ms ease-out forwards;
			}

			@keyframes fadeInUp {
				from { opacity: 0; transform: translateY(22px); }
				to { opacity: 1; transform: translateY(0); }
			}

			@media (prefers-reduced-motion: reduce) {
				body.page-animate { opacity: 1; transform: none; }
				body.page-animate.page-animate--visible { animation: none; }
			}
		</style>
	</head>
	<body class="page-animate">
		<!-- Navbar -->
		<nav class="navbar navbar-expand-md sticky-top shadow-sm bg-body">
			<div class="container">
				<a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
					<span class="logo-mark logo-theme-iceNavy">
						<span class="logo-color logo-F">F</span>
						<span class="logo-stack">
							<span class="logo-color logo-line">aber</span>
							<span class="logo-color logo-line">reelance</span>
						</span>
					</span>
				</a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="mainNav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item hvr-grow"><a id="navLink0" class="nav-link" href="index.html">Home</a></li>
						<li class="nav-item hvr-grow"><a id="navLink1" class="nav-link" href="about.html">About</a></li>
						<li class="nav-item hvr-grow"><a id="navLink2" class="nav-link" href="showreel.html">Showreel</a></li>
						<li class="nav-item hvr-grow"><a id="navLink3" class="nav-link" href="lavori.html">Lavori</a></li>
						<li class="nav-item hvr-grow"><a id="navLink4" class="nav-link" href="contatti.html">Contatti</a></li>
					</ul>
				</div>
			</div>
		</nav>

		<header class="page-hero text-center bg-light pt-2">
            <div class="container">
				<video class="hero-video" autoplay loop muted playsinline preload="metadata">
                    <source src="animazione.mp4" type="video/mp4">
                </video>
				<h1 id="landingHeroTitle" class="display-6" style="margin-bottom:-10px">FABRIZIO ARRIGO</h1>
				<p id="landingHeroSubtitle" class="lead mb-1">Montatore, videomaker, regista, filantropo.</p>
					<div class="scroll-cue">
						<button id="landingScrollBtn" class="scroll-down-btn" data-target="#mainContent" aria-label="Scorri ai contenuti">
							<i class="bi bi-chevron-down fs-3 scroll-icon"></i>
						</button>
					</div>
			</div>
		</header>
			<main id="mainContent">
			<!-- Immagini -->
				<section class="py-1 bg-light landing-images">
			<div class="container">
				<div class="row justify-content-center align-items-center g-3">

					<!-- Immagine sinistra -->
						<div class="col-12 col-md-3 text-center landing-image-col">
							<img id="landingImgLeft" class="img-fluid rounded shadow-sm pulse-target landing-img" alt="Immagine sinistra" loading="lazy" decoding="async" width="800" height="800" fetchpriority="low">
					</div>

					<!-- Immagine centrale (più grande) -->
						<div class="col-12 col-md-4 text-center landing-image-col">
							<img id="landingImgCenter" class="img-fluid rounded shadow pulse-target hero-center-img landing-img" alt="Immagine centrale" loading="eager" decoding="async" width="800" height="800" fetchpriority="high">
					</div>

					<!-- Immagine destra -->
						<div class="col-12 col-md-3 text-center landing-image-col">
							<img id="landingImgRight" class="img-fluid rounded shadow-sm pulse-target landing-img" alt="Immagine destra" loading="lazy" decoding="async" width="800" height="800" fetchpriority="low">
					</div>

				</div>
			</div>
		</section>

		<!-- Footer -->
		<footer class="py-4 mt-5">
			<div class="container d-flex flex-column flex-sm-row align-items-center justify-content-between gap-3">
				<div id="footerCopyright" class="small">
					© <span id="year"></span> Fabrizio Arrigo • Tutti i diritti riservati
				</div>
				<div class="d-flex gap-3 small">
					<a id="footerSocial0" href="https://www.linkedin.com/in/fabrizio-faber-arrigo-a1b77a22b" target="_blank" class="text-decoration-none"><i class="bi bi-linkedin"></i></a>
					<a id="footerSocial1" href="https://www.instagram.com/faber.arrigo" target="_blank" class="text-decoration-none"><i class="bi bi-instagram"></i></a>
				</div>
			</div>
		</footer>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="data/text-data.js"></script>
		<script>
		const textData = window.TEXT_DATA || {};

		function resolveLandingImageSrc(src){
			if(!src || typeof src !== 'string') return src;
			if(/^(https?:)?\/\//i.test(src) || /^(data:|blob:)/i.test(src)) return src;

			if(src.startsWith('/assets/')) return './data' + src;
			if(src.startsWith('./assets/')) return './data/' + src.slice(2);
			if(src.startsWith('assets/')) return './data/' + src;

			return src;
		}

		function applySharedText(){
			const shared = textData.shared || {};
			const nav = Array.isArray(shared.nav) ? shared.nav : [];
			nav.forEach((item, idx) => {
				const link = document.getElementById('navLink' + idx);
				if(!link || !item) return;
				if(item.label) link.textContent = item.label;
				if(item.href) link.href = item.href;
			});

			const footer = shared.footer || {};
			const footerCopy = document.getElementById('footerCopyright');
			if(footerCopy){
				const owner = footer.owner || 'Fabrizio Arrigo';
				const rights = footer.rights || 'Tutti i diritti riservati';
				const legal = footer.legal || {};
				const pIva = legal.pIva || '14043680967';
				const cf = legal.cf || 'RRGFRZ01R08F205A';
				const legalAddress = legal.legalAddress || 'Via Valparaiso, 17';
				footerCopy.innerHTML = '&copy; <span id="year"></span> ' + owner + ' • ' + rights + '<br>P.IVA ' + pIva + ' • CF ' + cf + ' • Sede legale: ' + legalAddress;
			}

			const socials = Array.isArray(footer.social) ? footer.social : [];
			socials.forEach((social, idx) => {
				const link = document.getElementById('footerSocial' + idx);
				if(!link || !social) return;
				if(social.href) link.href = social.href;
				link.setAttribute('aria-label', social.platform || 'Social');
			});
		}

		function applyLandingText(){
			const landing = textData.landing || {};
			const title = document.getElementById('landingHeroTitle');
			if(title && landing.heroTitle) title.textContent = landing.heroTitle;

			const subtitle = document.getElementById('landingHeroSubtitle');
			if(subtitle && landing.heroSubtitle) subtitle.textContent = landing.heroSubtitle;

			const scrollBtn = document.getElementById('landingScrollBtn');
			if(scrollBtn && landing.scrollButtonAriaLabel){
				scrollBtn.setAttribute('aria-label', landing.scrollButtonAriaLabel);
			}

			const images = landing.images || {};
			function configureLandingImage(img, options){
				if(!img) return;
				const cfg = options || {};
				img.decoding = 'async';
				img.loading = cfg.priority ? 'eager' : 'lazy';
				img.setAttribute('fetchpriority', cfg.priority ? 'high' : 'low');
			}
			const leftImg = document.getElementById('landingImgLeft');
			configureLandingImage(leftImg, { priority: false });
			if(leftImg && images.leftSrc) leftImg.src = resolveLandingImageSrc(images.leftSrc);
			if(leftImg && images.leftAlt) leftImg.alt = images.leftAlt;
			const centerImg = document.getElementById('landingImgCenter');
			configureLandingImage(centerImg, { priority: true });
			if(centerImg && images.centerSrc) centerImg.src = resolveLandingImageSrc(images.centerSrc);
			if(centerImg && images.centerAlt) centerImg.alt = images.centerAlt;
			const rightImg = document.getElementById('landingImgRight');
			configureLandingImage(rightImg, { priority: false });
			if(rightImg && images.rightSrc) rightImg.src = resolveLandingImageSrc(images.rightSrc);
			if(rightImg && images.rightAlt) rightImg.alt = images.rightAlt;
		}

		applySharedText();
		applyLandingText();

		document.getElementById('year').textContent = new Date().getFullYear();

		document.addEventListener('DOMContentLoaded', () => {
			document.body.classList.add('page-animate--visible');
		});

		document.querySelectorAll('.scroll-down-btn').forEach(btn => {
			btn.addEventListener('click', evt => {
				evt.preventDefault();
				const selector = btn.getAttribute('data-target');
				const target = selector ? document.querySelector(selector) : null;
				if (!target) return;
				const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
				if (reduce) {
					target.scrollIntoView();
					return;
				}
				const top = target.getBoundingClientRect().top + window.scrollY - 10;
				window.scrollTo({ top, behavior: 'smooth' });
			});
		});

		// Random alternating pulse for the three homepage images
		(function(){
		  const imgs = Array.from(document.querySelectorAll('.pulse-target'));
		  if (!imgs.length) return;
		  const ANIM_MS = 1200; // matches CSS animation duration
		  let last = -1;

		  function pickRandomDifferent(){
		    if (imgs.length === 1) return 0;
		    let idx;
		    do { idx = Math.floor(Math.random() * imgs.length); } while(idx === last);
		    return idx;
		  }

		  function pulseOnce(el){
		    // add class, remove after animation to allow retriggering later
		    el.classList.add('pulse');
		    setTimeout(()=> el.classList.remove('pulse'), ANIM_MS + 20);
		  }

		  // Start: trigger one immediately
		  const first = pickRandomDifferent();
		  last = first;
		  pulseOnce(imgs[first]);

		  // Repeatedly pick a different image and pulse it.
		  setInterval(()=>{
		    const idx = pickRandomDifferent();
		    last = idx;
		    pulseOnce(imgs[idx]);
		  }, ANIM_MS + 400); // small gap between pulses
		})();
		</script>
	</body>
</html>
