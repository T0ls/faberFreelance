        /* Lavori page: showreel-inspired cards but distinct styling */
        .filters {
          display:flex;
          gap:.5rem;
          justify-content:center;
          margin-bottom:1rem;
          flex-wrap:wrap;
          padding:.25rem 0;
        }
        .tag { font-size:.82rem; padding:.26rem .7rem; border-radius:999px; border:1px solid #eef2f7; background:#fff; white-space:nowrap; flex:0 0 auto; }

        /* Selected filter appearance */
        .filters .tag{ transition: all .16s ease; }
        .filters .tag[aria-pressed="true"], .filters .tag.btn-primary{
          background: #0b5fff; /* primary */
          color: #fff;
          border-color: transparent;
          box-shadow: 0 8px 24px rgba(11,95,255,0.12);
          transform: translateY(-2px) scale(1.02);
        }
        .filters .tag:focus{ outline: 2px solid rgba(11,95,255,0.12); outline-offset:2px; }

        @media (max-width:520px){
          .filters{ justify-content:center; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:0 .5rem; }
          .filters::-webkit-scrollbar{ height:6px; }
          .filters::-webkit-scrollbar-thumb{ background: rgba(0,0,0,0.06); border-radius:3px; }
        }

        .toolbar-row{
          display:flex;
          flex-wrap:wrap;
          gap:.6rem;
          justify-content:center;
          align-items:center;
          margin-top:.8rem;
        }
        .toolbar-row .form-control,
        .toolbar-row .form-select{
          max-width:260px;
          font-size:.92rem;
          border-radius:999px;
        }
        .clear-chip{
          border-radius:999px;
          font-size:.86rem;
          padding:.25rem .75rem;
          line-height:1.2;
        }

  /* grid: centered flow but tighter columns and cinematic cards */
  .gallery-wrap{ display:flex; flex-wrap:wrap; justify-content:center; gap:1.25rem; padding:2rem 0; }
  /* desktop: 3 columns, tablet: 2, mobile: 1 */
  .gallery-wrap .proj{ flex: 0 0 calc(33.333% - 0.833rem); max-width:420px; }
  @media (max-width:991px){ .gallery-wrap .proj{ flex:0 0 calc(50% - 0.625rem); } }
  @media (max-width:767px){ .gallery-wrap .proj{ flex:0 0 100%; max-width:100%; } }

  /* Minimal, clean card surface */
  .proj{ background:transparent; border-radius:10px; border:1px solid rgba(15,23,42,0.06); overflow:hidden; display:flex; flex-direction:column; min-height:220px; transition: transform .22s ease, box-shadow .22s ease; }
  .proj:hover{ transform: translateY(-4px); box-shadow: 0 14px 32px rgba(2,6,23,0.06); }

  /* Image area: simple, full-bleed */
  .proj .thumb{ display:block; width:100%; aspect-ratio:16/9; overflow:hidden; position:relative; }
  .proj .thumb img{ width:100%; height:100%; display:block; object-fit:cover; transition: transform .36s ease; }
  .proj:hover .thumb img{ transform: scale(1.03); }

  /* minimal overlay: small translucent white chip for light look */
  .overlay-label{ position:absolute; left:10px; bottom:10px; background: rgba(255,255,255,0.9); color:#0f172a; padding:.28rem .5rem; border-radius:6px; font-size:.88rem; display:inline-flex; gap:.4rem; align-items:center; box-shadow: 0 2px 8px rgba(2,6,23,0.04); }
  .overlay-label strong{ font-weight:600; font-size:.92rem; }

  /* meta body simplified */
  .card-body{ padding:.9rem 1rem; display:flex; flex-direction:column; gap:.35rem; justify-content:space-between; flex:1 1 auto; }
  .card-title{ font-size:1rem; margin:0; font-weight:600; color:#0b1220; }
  .card-text{ color:#6b7280; font-size:.9rem; margin:0; }
  .card-actions{ margin-top:.45rem; }
  .project-link{ color: #0b5fff; text-decoration: none; font-size:.92rem; font-weight:600; }
  .project-link:hover{ text-decoration:underline; }

  /* subtle entrance */
  .proj{ opacity:0; transform: translateY(6px); }
  .proj.show{ opacity:1; transform:none; transition: opacity .36s ease, transform .36s cubic-bezier(.2,.9,.3,1); }

    /* Page entry fade from bottom */
    body.page-animate {
      opacity: 0;
      transform: translateY(22px);
      transition: none;
    }

    body.page-animate.page-animate--visible {
      animation: fadeInUp 720ms ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      body.page-animate { opacity: 1; transform: none; }
      body.page-animate.page-animate--visible { animation: none; }
    }

    <script>
      function applySharedText(){
        const shared = (window.TEXT_DATA && window.TEXT_DATA.shared) || {};
        const nav = Array.isArray(shared.nav) ? shared.nav : [];
        nav.forEach((item, idx) => {
          const link = document.getElementById('navLink' + idx);
          if(!link || !item) return;
          if(item.label) link.textContent = item.label;
          if(item.href) link.href = item.href;
        });

        const footer = shared.footer || {};
        const footerCopy = document.getElementById('footerCopyright');
        if(footerCopy){
          const owner = footer.owner || 'Fabrizio Arrigo';
          const rights = footer.rights || 'Tutti i diritti riservati';
          const legal = footer.legal || {};
          const pIva = legal.pIva || '14043680967';
          const cf = legal.cf || 'RRGFRZ01R08F205A';
          const legalAddress = legal.legalAddress || 'Via Valparaiso, 17';
          footerCopy.innerHTML = '&copy; <span id="year"></span> ' + owner + ' • ' + rights + '<br>P.IVA ' + pIva + ' • CF ' + cf + ' • Sede legale: ' + legalAddress;
        }

        const socials = Array.isArray(footer.social) ? footer.social : [];
        socials.forEach((social, idx) => {
          const link = document.getElementById('footerSocial' + idx);
          if(!link || !social) return;
          if(social.href) link.href = social.href;
          link.setAttribute('aria-label', social.platform || 'Social');
        });
      }

      function applyLavoriPageText(){
        const pageText = (window.TEXT_DATA && window.TEXT_DATA.lavori) || {};
        const title = document.getElementById('lavoriHeroTitle');
        if(title && pageText.heroTitle) title.textContent = pageText.heroTitle;
        const subtitle = document.getElementById('lavoriHeroSubtitle');
        if(subtitle && pageText.heroSubtitle) subtitle.textContent = pageText.heroSubtitle;
      }

      applySharedText();
      applyLavoriPageText();

      document.getElementById('year').textContent = new Date().getFullYear();
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('page-animate--visible');
      });
    </script>

    <!-- load projects data (global) -->
    <script src="data/lavori-data.js"></script>

    <script>
  // Data-driven filtering, search and sorting for lavori
  window.addEventListener('load', function(){
    const container = document.getElementById('projectsContainer');
    const filtersContainer = document.querySelector('.filters');
    const noMatches = document.getElementById('noMatches');
    const searchInput = document.getElementById('projectSearch');
    const sortSelect = document.getElementById('projectSort');
    const clearFiltersChip = document.getElementById('clearFiltersChip');
    let projects = Array.from(document.querySelectorAll('.proj'));

    const active = new Set();

    function toToken(value){
      return String(value || '').trim().toLowerCase().replace(/\s+/g, '-');
    }

    function projectHref(slug){
      return slug ? 'dettagli-lavoro.html?slug=' + encodeURIComponent(slug) : '#';
    }

    function resolveAssetPath(basePath, assetPath){
      const value = String(assetPath || '');
      if(!value) return '';
      if(/^(?:https?:)?\/\//i.test(value) || value.startsWith('data:') || value.startsWith('./') || value.startsWith('../') || value.startsWith('/')){
        return value;
      }
      return String(basePath || '') + value;
    }

    function buildProjectCard(project){
      const p = project || {};
      const info = p.info || {};
      const title = p.title || 'Progetto';
      const year = info.year || '';
      const orderData = p.order_data || 0;
      const shortDescription = p.description_short || info.description || '';

      const article = document.createElement('article');
      article.className = 'proj';

      const tokens = (p.tags || []).map(toToken).filter(Boolean);
      article.dataset.cats = tokens.join(' ');
      article.dataset.title = String(title).toLowerCase();
      article.dataset.desc = String(shortDescription).toLowerCase();
      article.dataset.year = String(year);
      article.dataset.orderData = String(orderData);

      const thumbLink = document.createElement('a');
      thumbLink.className = 'thumb';
      thumbLink.href = projectHref(p.slug);

      const img = document.createElement('img');
      img.src = resolveAssetPath(p.rel_path, p.thumbnail);
      img.alt = title;
      thumbLink.appendChild(img);

      const label = document.createElement('div');
      label.className = 'overlay-label';

      const strong = document.createElement('strong');
      strong.textContent = title;
      label.appendChild(strong);

      if(year){
        const yearEl = document.createElement('span');
        yearEl.textContent = ' • ' + year;
        label.appendChild(yearEl);
      }

      thumbLink.appendChild(label);
      article.appendChild(thumbLink);

      const body = document.createElement('div');
      body.className = 'card-body';

      const textWrap = document.createElement('div');
      const text = document.createElement('p');
      text.className = 'card-text';
      text.textContent = shortDescription;
      textWrap.appendChild(text);
      body.appendChild(textWrap);

      const actions = document.createElement('div');
      actions.className = 'card-actions';
      const openLink = document.createElement('a');
      openLink.className = 'project-link';
      openLink.href = projectHref(p.slug);
      openLink.textContent = 'Apri progetto →';
      actions.appendChild(openLink);
      body.appendChild(actions);

      article.appendChild(body);
      return article;
    }

    if((!projects || !projects.length) && window.PROJECTS && Array.isArray(window.PROJECTS)){
      const tagsMap = new Map();
      window.PROJECTS.forEach(p => {
        (p.tags || []).forEach(tag => {
          const token = toToken(tag);
          if(token && !tagsMap.has(token)) tagsMap.set(token, tag);
        });
      });

      Array.from(tagsMap.entries())
        .sort((a, b) => String(a[1]).localeCompare(String(b[1]), 'it', { sensitivity: 'base' }))
        .forEach(([token, label]) => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-outline-secondary btn-sm tag';
          btn.setAttribute('data-filter', token);
          btn.textContent = label;
          filtersContainer.appendChild(btn);
        });

      (window.PROJECTS || []).forEach((project) => {
        container.insertBefore(buildProjectCard(project), noMatches);
      });

      projects = Array.from(document.querySelectorAll('.proj'));
    }

    projects.forEach((projectCard) => {
      const titleEl = projectCard.querySelector('.card-title, .overlay-label strong');
      const descEl = projectCard.querySelector('.card-text');
      if(!projectCard.dataset.title) projectCard.dataset.title = (titleEl ? titleEl.textContent : '').toLowerCase();
      if(!projectCard.dataset.desc) projectCard.dataset.desc = (descEl ? descEl.textContent : '').toLowerCase();

      const catsRaw = (projectCard.dataset.cats || '').split(/\s+/).filter(Boolean);
      projectCard.dataset.cats = catsRaw.map(toToken).join(' ');
    });

    function filterButtons(){
      return Array.from(document.querySelectorAll('.filters [data-filter]'));
    }

    function updateFilterUI(){
      filterButtons().forEach(btn => {
        const filter = btn.dataset.filter;
        if(filter === 'all'){
          const allActive = active.size === 0;
          btn.classList.toggle('btn-primary', allActive);
          btn.setAttribute('aria-pressed', allActive ? 'true' : 'false');
          const existing = btn.querySelector('.close-x');
          if(existing) existing.remove();
          return;
        }

        const isActive = active.has(filter);
        btn.classList.toggle('btn-primary', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');

        const existing = btn.querySelector('.close-x');
        if(!isActive){
          if(existing) existing.remove();
          return;
        }

        if(!existing){
          const close = document.createElement('span');
          close.className = 'close-x';
          close.innerHTML = '&times;';
          close.title = 'Rimuovi filtro ' + (btn.textContent || '').replace('×', '').trim();
          close.style.marginLeft = '.45rem';
          close.style.cursor = 'pointer';
          close.style.fontWeight = '700';
          close.addEventListener('click', (ev) => {
            ev.stopPropagation();
            active.delete(filter);
            updateFilterUI();
            applyFiltersSearchAndSort();
          });
          btn.appendChild(close);
        }
      });
    }

    function applyFiltersSearchAndSort(){
      const selected = Array.from(active);
      const searchTerm = String(searchInput && searchInput.value || '').trim().toLowerCase();
      const sortMode = String(sortSelect && sortSelect.value || 'recent');

      const visible = [];
      projects.forEach((projectCard) => {
        const cats = (projectCard.dataset.cats || '').split(/\s+/).filter(Boolean);
        const matchesFilter = selected.length === 0 || selected.some(f => cats.includes(f));
        const titleOnly = projectCard.dataset.title || '';
        const matchesSearch = !searchTerm || titleOnly.includes(searchTerm);

        if(matchesFilter && matchesSearch){
          visible.push(projectCard);
        }
      });

      visible.sort((a, b) => {
        const titleA = a.dataset.title || '';
        const titleB = b.dataset.title || '';
        const yearA = parseInt(a.dataset.year || '0', 10) || 0;
        const yearB = parseInt(b.dataset.year || '0', 10) || 0;
        const orderA = parseInt(a.dataset.orderData || '0', 10) || 0;
        const orderB = parseInt(b.dataset.orderData || '0', 10) || 0;

        if(sortMode === 'az') return titleA.localeCompare(titleB, 'it', { sensitivity: 'base' });
        if(sortMode === 'oldest') return orderB - orderA || yearA - yearB || titleA.localeCompare(titleB, 'it', { sensitivity: 'base' });
        return orderA - orderB || yearB - yearA || titleA.localeCompare(titleB, 'it', { sensitivity: 'base' });
      });

      projects.forEach((projectCard) => {
        projectCard.classList.remove('show');
        projectCard.style.display = 'none';
      });

      visible.forEach((projectCard, index) => {
        container.insertBefore(projectCard, noMatches);
        projectCard.style.display = '';
        setTimeout(() => projectCard.classList.add('show'), 35 + index * 24);
      });

      if(noMatches) noMatches.style.display = visible.length ? 'none' : 'block';
    }

    function bindFilterClickHandlers(){
      filterButtons().forEach(btn => {
        btn.addEventListener('click', () => {
          const filter = btn.dataset.filter;
          if(filter === 'all'){
            active.clear();
          } else if(active.has(filter)){
            active.delete(filter);
          } else {
            active.add(filter);
          }

          updateFilterUI();
          applyFiltersSearchAndSort();
        });
      });
    }

    bindFilterClickHandlers();

    if(searchInput){
      searchInput.addEventListener('input', applyFiltersSearchAndSort);
    }
    if(sortSelect){
      sortSelect.addEventListener('change', applyFiltersSearchAndSort);
    }

    if(clearFiltersChip){
      clearFiltersChip.addEventListener('click', () => {
        active.clear();
        if(searchInput) searchInput.value = '';
        if(sortSelect) sortSelect.value = 'recent';
        updateFilterUI();
        applyFiltersSearchAndSort();
      });
    }

    updateFilterUI();
    applyFiltersSearchAndSort();

    function centerFiltersScroll(){
      const filtersBar = document.querySelector('.filters');
      if(!filtersBar) return;
      if(filtersBar.scrollWidth > filtersBar.clientWidth){
        try { filtersBar.scrollLeft = Math.round((filtersBar.scrollWidth - filtersBar.clientWidth) / 2); }
        catch (e) { /* no-op */ }
      }
    }

    centerFiltersScroll();
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(centerFiltersScroll, 140);
    });
  });
  </script>
