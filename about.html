		.skill-row{

			align-items:center;

			margin-bottom:.95rem;

		.skill-row:last-child{
			margin-bottom:0;
		}

		.skill-label{
			flex:0 0 36%;
			font-family:"Inria Serif", serif;
			font-weight:700;
			font-size:1.25rem;
			line-height:1;
			text-align:right;
			color:#0f172a;
		}

		.skill-bar-wrap{
			flex:1;
			display:flex;
			justify-content:flex-start;
			background:#e9edf3;
			border-radius:999px;
			overflow:hidden;
		}

		.skill-bar-wrap.skill-overflow{
			overflow:visible;
			margin-right:-30px;
		}

		.skill-bar{
			height:1rem;
			border-radius:999px;
		}

		@media (max-width: 991px){
			.skill-label{
				font-size:1.05rem;
				flex-basis:36%;
			}
			.skill-bar{ height:.9rem; }
		}

		@media (max-width: 576px){
			.skill-board{ padding:1rem .75rem; }
			.skill-row{ gap:.6rem; }
			.skill-label{ font-size:.92rem; flex-basis:39%; }
			.skill-bar{ height:.82rem; }
			.skill-bar-wrap.skill-overflow{ margin-right:-12px; }
		}

		@media (min-width: 768px){
			.about-skills-col{
				padding-top: 3rem;
			}
		}

		.page-hero{ padding:4rem 0; }

		/* Page entry fade from bottom */
		body.page-animate {
			opacity: 0;
			transform: translateY(22px);
			transition: none;
		}

		body.page-animate.page-animate--visible {
			animation: fadeInUp 720ms ease-out forwards;
		}

		@keyframes fadeInUp {
			from { opacity: 0; transform: translateY(22px); }
			to { opacity: 1; transform: translateY(0); }
		}

		@media (prefers-reduced-motion: reduce) {
			body.page-animate { opacity: 1; transform: none; }
			body.page-animate.page-animate--visible { animation: none; }
		}

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="data/text-data.js"></script>
		<script>
			const textData = window.TEXT_DATA || {};

			function applySharedText(){
				const shared = textData.shared || {};
				const nav = Array.isArray(shared.nav) ? shared.nav : [];
				nav.forEach((item, idx) => {
					const link = document.getElementById('navLink' + idx);
					if(!link || !item) return;
					if(item.label) link.textContent = item.label;
					if(item.href) link.href = item.href;
				});

				const footer = shared.footer || {};
				const footerCopy = document.getElementById('footerCopyright');
				if(footerCopy){
					const owner = footer.owner || 'Fabrizio Arrigo';
					const rights = footer.rights || 'Tutti i diritti riservati';
					const legal = footer.legal || {};
					const pIva = legal.pIva || '14043680967';
					const cf = legal.cf || 'RRGFRZ01R08F205A';
					const legalAddress = legal.legalAddress || 'Via Valparaiso, 17';
					footerCopy.innerHTML = '&copy; <span id="year"></span> ' + owner + ' • ' + rights + '<br>P.IVA ' + pIva + ' • CF ' + cf + ' • Sede legale: ' + legalAddress;
				}

				const socials = Array.isArray(footer.social) ? footer.social : [];
				socials.forEach((social, idx) => {
					const link = document.getElementById('footerSocial' + idx);
					if(!link || !social) return;
					if(social.href) link.href = social.href;
					link.setAttribute('aria-label', social.platform || 'Social');
				});
			}

			function applyAboutText(){
				const about = textData.about || {};

				function getSkillGradient(percent){
					const clamped = Math.max(0, Math.min(percent, 100));
					const ratio = clamped / 100;
					const startHue = Math.round(46 + (ratio * 96));
					const endHue = Math.min(160, startHue + 12);
					const startSat = Math.round(68 - (ratio * 6));
					const endSat = Math.round(74 - (ratio * 6));
					const startLight = Math.round(57 - (ratio * 18));
					const endLight = Math.round(64 - (ratio * 10));
					return 'linear-gradient(90deg, hsl(' + startHue + ', ' + startSat + '%, ' + startLight + '%), hsl(' + endHue + ', ' + endSat + '%, ' + endLight + '%))';
				}

				const heroTitle = document.getElementById('aboutHeroTitle');
				if(heroTitle && about.heroTitle) heroTitle.textContent = about.heroTitle;

				const heroSubtitle = document.getElementById('aboutHeroSubtitle');
				if(heroSubtitle && about.heroSubtitle) heroSubtitle.textContent = about.heroSubtitle;

				const skillsBoard = document.getElementById('aboutSkillsBoard');
				if(skillsBoard && about.skillsAriaLabel){
					skillsBoard.setAttribute('aria-label', about.skillsAriaLabel);
				}

				const skills = Array.isArray(about.skills) ? about.skills : [];
				skills.forEach((skillItem, idx) => {
					const skill = (skillItem && typeof skillItem === 'object') ? skillItem : { label: skillItem, percent: 0 };
					const label = skill.label || '';
					const percentValue = Number(skill.percent);
					const percent = Number.isFinite(percentValue) ? Math.max(0, percentValue) : 0;

					const skillLabel = document.getElementById('aboutSkill' + idx);
					if(skillLabel && label) skillLabel.textContent = label;

					const skillWrap = document.getElementById('aboutSkillWrap' + idx);
					const skillBar = document.getElementById('aboutSkillBar' + idx);
					if(skillWrap && skillBar){
						skillBar.style.width = percent + '%';
						skillBar.style.background = getSkillGradient(percent);
						skillWrap.classList.toggle('skill-overflow', percent > 100);
						skillBar.style.boxShadow = (percent > 100)
							? '0 0 0 1px rgba(31,143,88,.06), 0 6px 16px rgba(47,185,111,.22)'
							: 'none';
					}
				});

				const profileTitle = document.getElementById('aboutProfileTitle');
				if(profileTitle && about.profileTitle) profileTitle.textContent = about.profileTitle;

				const paragraphs = Array.isArray(about.paragraphs) ? about.paragraphs : [];
				paragraphs.forEach((text, idx) => {
					const paragraph = document.getElementById('aboutParagraph' + idx);
					if(paragraph && text) paragraph.textContent = text;
				});

				const servicesTitle = document.getElementById('aboutServicesTitle');
				if(servicesTitle && about.servicesTitle) servicesTitle.textContent = about.servicesTitle;

				const servicesList = document.getElementById('aboutServicesList');
				const services = Array.isArray(about.services) ? about.services : [];
				if(servicesList && services.length){
					servicesList.innerHTML = '';
					services.forEach((item) => {
						const li = document.createElement('li');
						li.textContent = item;
						servicesList.appendChild(li);
					});
				}
			}

			applySharedText();
			applyAboutText();

			document.getElementById('year').textContent = new Date().getFullYear();
			document.addEventListener('DOMContentLoaded', () => {
				document.body.classList.add('page-animate--visible');
			});
		</script>
